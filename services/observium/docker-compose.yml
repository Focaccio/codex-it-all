services:
  observium-db:
    image: mariadb:11.4
    container_name: observium-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${OBSERVIUM_DB_ROOT_PASSWORD:?set OBSERVIUM_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: observium
      MARIADB_USER: observium
      MARIADB_PASSWORD: ${OBSERVIUM_DB_PASSWORD:?set OBSERVIUM_DB_PASSWORD}
    volumes:
      - /opt/server101/services/observium/db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  observium:
    image: uberchuckie/observium:12.0.0
    container_name: observium
    restart: unless-stopped
    depends_on:
      observium-db:
        condition: service_healthy
    environment:
      TZ: America/Los_Angeles
      OBSERVIUM_DB_PASSWORD: ${OBSERVIUM_DB_PASSWORD:?set OBSERVIUM_DB_PASSWORD}
    ports:
      - "8668:8668"
    volumes:
      - /opt/server101/services/observium/config:/config
      - /opt/server101/services/observium/logs:/opt/observium/logs
      - /opt/server101/services/observium/rrd:/opt/observium/rrd
      - /opt/server101/services/observium/overrides/10_syslog-ng.init:/etc/my_init.d/10_syslog-ng.init:ro
      - /opt/server101/services/observium/overrides/firstrun.sh:/etc/my_init.d/firstrun.sh:ro
      - /opt/server101/services/observium/overrides/mariadb.run:/etc/service/mariadb/run:ro
