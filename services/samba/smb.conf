[global]
   workgroup = WORKGROUP
   server string = Server 101 NAS
   netbios name = S101

   server role = standalone server
   security = user
   map to guest = Bad User

   hosts allow = 127. <LAN_PREFIX>.
   hosts deny = 0.0.0.0/0

   server min protocol = SMB2_10
   server max protocol = SMB3
   smb encrypt = desired

   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file

   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

   vfs objects = acl_xattr
   map acl inherit = yes
   store dos attributes = yes

[server101]
   comment = Server 101 shared storage
   path = /srv/samba/server101
   browseable = yes
   read only = no
   guest ok = no
   valid users = autoadmin
   force group = smbusers
   create mask = 0660
   directory mask = 2770
   inherit permissions = yes
