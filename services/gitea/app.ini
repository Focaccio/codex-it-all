APP_NAME = Server 101 Git
RUN_USER = git
WORK_PATH = /var/lib/gitea

[repository]
ROOT = /var/lib/gitea/data/gitea-repositories

[server]
PROTOCOL = http
HTTP_ADDR = 0.0.0.0
HTTP_PORT = 3000
DOMAIN = s101.top.demosdnx.net
SSH_DOMAIN = s101.top.demosdnx.net
SSH_PORT = 22
START_SSH_SERVER = false
ROOT_URL = http://s101.top.demosdnx.net:3000/
OFFLINE_MODE = true
LFS_START_SERVER = true
LFS_JWT_SECRET = __GITEA_LFS_JWT_SECRET__

[database]
DB_TYPE = sqlite3
PATH = /var/lib/gitea/data/gitea.db

[security]
INSTALL_LOCK = true
SECRET_KEY = __GITEA_SECRET_KEY__
INTERNAL_TOKEN = __GITEA_INTERNAL_TOKEN__

[oauth2]
JWT_SECRET = __GITEA_OAUTH2_JWT_SECRET__

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = false

[openid]
ENABLE_OPENID_SIGNIN = false
ENABLE_OPENID_SIGNUP = false

[picture]
DISABLE_GRAVATAR = true
ENABLE_FEDERATED_AVATAR = false

[mailer]
ENABLED = false

[session]
PROVIDER = file

[log]
MODE = console,file
LEVEL = Info
ROOT_PATH = /var/lib/gitea/log
